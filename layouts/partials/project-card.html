<article class="project-card">
	<h3><a href="{{ .RelPermalink }}">{{ .LinkTitle }}</a></h3>
	<p>{{ .Params.description | default .Summary }}</p>
	{{- with .Params.tags }}
	<ul class="tag-list">
		{{- range . }}
		<li>{{ . }}</li>
		{{ end }}
	</ul>
	{{- end }}
	<div class="project-links">
		{{- with .Params.status }}
		<span class="status-badge status-{{ . }}">{{ . }}</span>
		{{- end }} {{- with .Params.repo }}<a href="{{ . }}">Repository</a>{{- end
		}} {{- with .Params.live }}<a href="{{ . }}">Live site</a>{{- end }}
	</div>
</article>
