<meta charset="utf-8" />
<meta
	name="viewport"
	content="width=device-width, minimum-scale=1.0, initial-scale=1.0"
/>
<link rel="icon" href="favicon.svg" />
<title>
	{{ if .IsHome }}{{ site.Title }}{{ else }}{{ printf "%s | %s" .Title
	site.Title }}{{ end }}
</title>
{{- with (or .Description .Summary site.Params.description) }}
<meta name="description" content="{{ . }}" />
{{- end }} {{ partialCached "head/css.html" . }} {{ partialCached "head/js.html"
. }}
